
# mycgi.conf - route all requests to a single CGI handler

# Ensure required modules are loaded so CGI + rewrite work
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule cgi_module modules/mod_cgi.so

<Directory "/usr/local/apache2/cgi-bin">
    AllowOverride None
    Options +ExecCGI
    Require all granted
</Directory>

AddHandler cgi-script .cgi

# Rewrite everything (except the handler itself) to the handler CGI
RewriteEngine On
# Exclude requests already aimed at the handler (with or without extra path)
RewriteCond %{REQUEST_URI} !^/cgi-bin/handler.cgi(?:/.*)?$
# In server context the URL-path tested by RewriteRule does not start with a
# leading slash, so match without it. Append the original path to the handler
# so it becomes the PATH_INFO available to the CGI as required.
RewriteRule ^(.*)$ /cgi-bin/handler.cgi/$1 [L,QSA,PT]

# If a requested resource under the DocumentRoot is not found, forward to the
# CGI handler. This provides a simple catch-all when mod_rewrite rules aren't
# applied for some request types.
<Directory "/usr/local/apache2/htdocs">
    FallbackResource /cgi-bin/handler.cgi
</Directory>
